name: Build and Release

# === 关键修复：添加此权限声明 ===
permissions:
  contents: write
# ==============================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-docx pywin32

      - name: Build Windows executable
        run: |
          $docxPath = python -c "import docx, os; print(os.path.join(os.path.dirname(docx.__file__), 'templates'))"
          echo "docx templates path: $docxPath"
          pyinstaller --onefile --windowed --name=docformat_windows --add-data "scripts;scripts" --add-data "${docxPath};docx/templates" --hidden-import=docx --hidden-import=lxml --hidden-import=pythoncom --hidden-import=pywintypes docformat_gui.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/docformat_windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-docx

      - name: Build Linux executable
        run: |
          DOCX_TEMPLATES=$(python3 -c "import docx, os; print(os.path.join(os.path.dirname(docx.__file__), 'templates'))")
          pyinstaller --onefile --name=docformat_linux \
            --add-data "scripts:scripts" \
            --add-data "${DOCX_TEMPLATES}:docx/templates" \
            --hidden-import=docx --hidden-import=lxml \
            docformat_gui.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/docformat_linux

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller python-docx

      - name: Build macOS executable
        run: |
          DOCX_TEMPLATES=$(python3 -c "import docx, os; print(os.path.join(os.path.dirname(docx.__file__), 'templates'))")
          echo "docx templates path: ${DOCX_TEMPLATES}"
          ls -la "${DOCX_TEMPLATES}/"
          pyinstaller --onefile --windowed --name=docformat_macos \
            --add-data "scripts:scripts" \
            --add-data "${DOCX_TEMPLATES}:docx/templates" \
            --hidden-import=docx --hidden-import=lxml \
            docformat_gui.py

      - name: Package as DMG
        run: |
          # PyInstaller --windowed on macOS generates a .app bundle in dist/
          # If .app exists, create a DMG; otherwise fall back to the single binary
          if [ -d "dist/docformat_macos.app" ]; then
            hdiutil create -volname "DocFormatter" -srcfolder dist/docformat_macos.app -ov -format UDZO dist/docformat_macos.dmg
          elif [ -f "dist/docformat_macos" ]; then
            mkdir -p dist/dmg_staging
            cp dist/docformat_macos dist/dmg_staging/
            hdiutil create -volname "DocFormatter" -srcfolder dist/dmg_staging -ov -format UDZO dist/docformat_macos.dmg
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/docformat_macos.dmg
            dist/docformat_macos.app
            dist/docformat_macos

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist/
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist/

      - name: List dist contents
        run: ls -laR dist/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: 公文格式处理工具 ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Windows 版下载
            
            👉 [docformat_windows.exe](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_windows.exe)
            
            ## Linux 版下载
            
            👉 [docformat_linux](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_linux)
            
            **Linux 运行说明**：
            1. `chmod +x docformat_linux`
            2. `./docformat_linux`
            3. 仅支持 `.docx` 文件
            
            ## macOS 版下载
            
            👉 [docformat_macos.dmg](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/docformat_macos.dmg)
            
            **macOS 运行说明**：
            1. 双击 `.dmg` 文件挂载
            2. 将应用拖入"应用程序"文件夹，或直接双击运行
            3. 首次打开如提示"无法验证开发者"，右键点击应用 → 选择"打开"
            4. 仅支持 `.docx` 文件（macOS 不支持 .doc/.wps 转换）
            
            ## 使用说明
            
            1. 下载对应系统的文件
            2. 双击运行
            3. 选择要处理的 .docx 文件
            4. 点击「开始处理」
            
            ## 功能
            
            - ✅ 智能一键处理（标点修复 + 格式统一）
            - ✅ 格式诊断（仅分析，不修改）
            - ✅ 标点符号修复
            - ✅ 支持 GB/T 公文标准
            
          files: |
            dist/docformat_windows.exe
            dist/docformat_linux
            dist/docformat_macos.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
